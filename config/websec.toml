# WebSec Configuration Example
# Copy to websec.toml and customize for your environment

[server]
# Listen address and port
listen = "0.0.0.0:8080"

# Backend web server URL
backend = "http://127.0.0.1:3000"

# Number of worker threads (default: CPU cores)
workers = 4

[reputation]
# Base score for new IPs (0-100, where 100 is excellent)
base_score = 100

# Decision thresholds
threshold_allow = 70        # >= 70: ALLOW
threshold_ratelimit = 40    # 40-69: RATE_LIMIT
threshold_challenge = 20    # 20-39: CHALLENGE
threshold_block = 0         # < 20: BLOCK

# Exponential decay half-life in hours
decay_half_life_hours = 24.0

# Correlation penalty bonus for multiple different signals
correlation_penalty_bonus = 10

# Signal weights (optional - defaults in code if not specified)
# Bot detection signals
[reputation.signal_weights]
VulnerabilityScan = 25       # Tool signatures + path scans (wp-admin, .env, 404 bursts)
SuspiciousUserAgent = 10     # Medium: curl, wget, python-requests
BotBehaviorPattern = 15      # Missing UA or non-human profile
AbusiveClient = 15           # Excessive requests without assets

# Brute force signals (US2)
FailedLogin = 20                # Multiple failed login attempts from same IP
LoginAttemptPattern = 20        # Rapid sequential login attempts (password spray)
CredentialStuffing = 25         # Same credentials from multiple IPs

# Flood/DDoS signals (US3)
RequestFlood = 20               # 100+ req in 60s or 50+ req in 2s burst
ConnectionFlood = 20            # SYN flood, slowloris (future)
DistributedAttack = 10          # Coordinated multi-IP attack (future)

# Injection attacks (US4)
SqlInjectionAttempt = 30        # UNION SELECT, DROP TABLE, OR '1'='1, SLEEP()
XssAttempt = 30                 # <script>, onerror, onload, javascript:
PathTraversalAttempt = 30       # ../, ..\\, %2e%2e%2f
RceAttempt = 50                 # Command injection: ;cat, backticks, $()

# Geographic signals (Geo Detection)
HighRiskCountry = 15            # Request from high-risk country (CN, RU, KP, IR, SY)
ImpossibleTravel = 20           # Country changed within 1 hour for same IP

# Header manipulation signals (Header Detection)
HeaderInjection = 20            # CRLF injection, null bytes, oversized headers
HostHeaderAttack = 20           # Multiple Host headers (cache poisoning)
RefererSpoofing = 10            # Suspicious referer TLD (.ru, .cn, .tk, .ml)

[lists]
# Blacklist: IPs to block immediately (score = 0, decision = BLOCK)
# Takes highest priority - overrides whitelist and scoring
blacklist = [
    # "192.168.1.100",
    # "10.0.0.50",
]

# Whitelist: Trusted IPs (score = 100, decision = ALLOW)
# Bypasses all detectors and scoring logic
whitelist = [
    # "127.0.0.1",
    # "::1",
]

[storage]
# Storage type: "redis" or "memory" (for testing)
type = "redis"

# Redis connection URL
redis_url = "redis://127.0.0.1:6379"

# L1 cache size (number of IPs)
cache_size = 10000

[geolocation]
enabled = true

# Path to GeoIP2 database (MaxMind GeoLite2-Country.mmdb)
# Download from: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
database = "/usr/share/GeoIP/GeoLite2-Country.mmdb"

# High-risk countries (ISO 3166-1 alpha-2 codes)
# Requests from these countries generate HighRiskCountry signal (weight 15)
risk_countries = ["CN", "RU", "KP", "IR", "SY"]

# Impossible travel detection window (seconds)
# If IP country changes within this window, generates ImpossibleTravel signal (weight 20)
impossible_travel_window = 3600  # 1 hour

[ratelimit]
# Normal tier (score 80-100)
normal_rpm = 1000
normal_burst = 100

# Suspicious tier (score 50-79)
suspicious_rpm = 200
suspicious_burst = 20

# Aggressive tier (score 20-49)
aggressive_rpm = 50
aggressive_burst = 5

# Sliding window duration (seconds)
window_duration_secs = 60

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log format: "json" or "pretty"
format = "json"

[metrics]
# Enable Prometheus metrics
enabled = true

# Metrics HTTP port
port = 9090
