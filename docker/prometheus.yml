global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'websec-monitor'

scrape_configs:
  # WebSec Proxy metrics
  - job_name: 'websec'
    static_configs:
      - targets: ['websec:8080']
        labels:
          service: 'websec-proxy'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
