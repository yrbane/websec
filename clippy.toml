# WebSec Clippy Configuration (Strict Mode)
# Constitution Principle V: Quality Triad

# Deny all warnings in CI
warn-on-all-wildcard-imports = true

# Complexity thresholds
cognitive-complexity-threshold = 15
type-complexity-threshold = 150

# Performance and code quality
too-many-arguments-threshold = 5
too-many-lines-threshold = 150

# Note: To enable pedantic lints, use: cargo clippy -- -W clippy::pedantic
# Note: single-char-lifetime-names is controlled via lint attributes in code
