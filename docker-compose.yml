services:
  # Backend de test
  backend:
    image: python:3.12-alpine
    container_name: websec-backend
    working_dir: /app
    volumes:
      - ./scripts/test-backend.py:/app/test-backend.py:ro
    command: python /app/test-backend.py 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:3000/api/health\")' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - websec-network

  # Redis (optionnel, pour future implémentation)
  redis:
    image: redis:7-alpine
    container_name: websec-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - websec-network

  # WebSec Proxy
  websec:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: websec-proxy
    ports:
      - "8080:8080"  # Proxy HTTP
      - "9090:9090"  # Métriques Prometheus
    environment:
      - RUST_LOG=info
    volumes:
      - ./config/websec-docker.toml:/app/config/websec.toml:ro
    command: ["/app/websec", "run", "--config", "/app/config/websec.toml"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - websec-network
    restart: unless-stopped

  # Prometheus (monitoring optionnel)
  prometheus:
    image: prom/prometheus:latest
    container_name: websec-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - websec
    networks:
      - websec-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  websec-network:
    driver: bridge
